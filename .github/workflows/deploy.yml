name: Deploy

# Déploiement du site statique (dist/) vers l'hébergement OVH par FTPS.
# Déclenché à chaque push sur main, après build + tests.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   FTP_SERVER   ex. ftp.clusterXXX.hosting.ovh.net
#   FTP_USER     identifiant FTP OVH
#   FTP_PASSWORD mot de passe FTP OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # OVH free hosting : pas de FTPS, mais SFTP dispo sur le port 22 (transfert
      # chiffré, sans shell). On déploie avec lftp mirror — inclut les dotfiles
      # (.htaccess), gère --delete et les exclusions. Mot de passe via sshpass -e
      # (jamais dans la ligne de commande).
      - name: Deploy to OVH (SFTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp sshpass
          lftp -c "
            set sftp:connect-program 'sshpass -e ssh -a -x -p 22 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null';
            open sftp://$FTP_USER@$FTP_SERVER;
            mirror -R --delete --verbose --exclude .well-known/ ./dist/ www/;
            bye
          "
